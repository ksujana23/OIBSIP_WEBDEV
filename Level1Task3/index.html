<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

</head>

<body>

    <div class="container">

        <div class="converter">

            <h1>Temperature Converter</h1>

            <!-- Input Group -->

            <div class="input-group">

                <!-- Degrees -->

                <div class="field">

                    <label>Degrees</label>

                    <input
                    type="number"
                    id="temperature"
                    placeholder="Enter value">

                </div>

                <!-- Type -->

                <div class="field">

                    <label>Type</label>

                    <select id="unit">

                        <option value="cToF">
                            Celsius to Fahrenheit
                        </option>

                        <option value="fToC">
                            Fahrenheit to Celsius
                        </option>

                        <option value="cToK">
                            Celsius to Kelvin
                        </option>

                    </select>

                </div>

            </div>

            <!-- Button -->

            <button onclick="convertTemperature()">

                Convert

            </button>

            <!-- Result -->

            <div class="result-box">

                <label>Result</label>

                <h2 id="result">

                    --

                </h2>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
